<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | NIROSHA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: sans-serif; color: #fff; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 320px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #007aff; object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 122, 255, 0.6); }
        h1 { font-size: 24px; margin-bottom: 5px; font-weight: bold; }
        .user-email { color: #00ffcc; margin: 15px 0; font-size: 14px; letter-spacing: 0.5px; }
        .btn-continue { background: #007aff; color: #fff; border: none; padding: 14px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 12px; transition: 0.3s; }
        .btn-logout { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid #ff3b30; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-continue:hover { background: #0056b3; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.png" class="profile-img" alt="Nirosha">
        <h1>Welcome Back! 👋</h1>
        <div id="displayEmail" class="user-email">Connecting...</div>
        <button class="btn-continue" onclick="window.location.href='main.html'">CONTINUE</button>
        <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgZp_3OHfhO6VOOxoQyDcUU-e6F4kTcSA",
            authDomain: "sandaruwan-web.firebaseapp.com",
            projectId: "sandaruwan-web",
            storageBucket: "sandaruwan-web.firebasestorage.app",
            messagingSenderId: "219324339628",
            appId: "1:219324339628:web:7b237143ed408c3a921609"
        };
        firebase.initializeApp(firebaseConfig);
        firebase.auth().onAuthStateChanged((user) => {
            if (user) { document.getElementById('displayEmail').innerText = user.email; }
            else { window.location.href = "index.html"; }
        });
        function logout() { firebase.auth().signOut().then(() => { window.location.href = "index.html"; }); }
    </script>
</body>
</html>
