<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SANDARUWAN</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 300px; }
        h2 { color: #007aff; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>LOGIN</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="auth()">LOGIN</button>
        <p id="error" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>

    <script>
        function auth() {
            var email = document.getElementById("email").value;
            var pass = document.getElementById("pass").value;

            // මෙතන ඔයාගේ Email එක සහ Password එක දාන්න
            if(email == "admin@gmail.com" && pass == "1234") {
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("error").innerHTML = "Email හෝ Password වැරදියි!";
            }
        }
    </script>
</body>
</html>
