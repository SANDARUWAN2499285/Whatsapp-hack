<input type="email" id="userEmail" placeholder="Email Address">
<input type="password" id="userPass" placeholder="Password">

<button class="btn login-btn" onclick="signIn()">SIGN IN</button>
<button class="btn signup-btn" onclick="signUp()">REGISTER</button>

<script>
  // Firebase Config එක (ඔයා කලින් එවපු එකමයි)
  const firebaseConfig = {
    apiKey: "AIzaSyCgZp_3OHfhO6VOOxoQyDcUU-e6F4kTcSA",
    authDomain: "sandaruwan-web.firebaseapp.com",
    databaseURL: "https://sandaruwan-web-default-rtdb.firebaseio.com",
    projectId: "sandaruwan-web",
    storageBucket: "sandaruwan-web.firebasestorage.app",
    messagingSenderId: "219324339628",
    appId: "1:219324339628:web:7b237143ed408c3a921609"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // REGISTER FUNCTION
  function signUp() {
    const email = document.getElementById('userEmail').value;
    const pass = document.getElementById('userPass').value;

    if(email === "" || pass === "") {
        alert("Please fill all fields");
        return;
    }

    auth.createUserWithEmailAndPassword(email, pass)
      .then((userCredential) => {
        alert("Account Created Successfully! 🎉");
      })
      .catch((error) => {
        alert("Error: " + error.message);
      });
  }

  // SIGN IN FUNCTION
  function signIn() {
    const email = document.getElementById('userEmail').value;
    const pass = document.getElementById('userPass').value;

    auth.signInWithEmailAndPassword(email, pass)
      .then((userCredential) => {
        alert("Login Success! ✅");
        window.location.href = "home.html";
      })
      .catch((error) => {
        alert("Error: " + error.message);
      });
  }
</script>
