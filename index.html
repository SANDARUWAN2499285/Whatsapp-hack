<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANDARUWAN WEB | ULTIMATE LOGIN</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Animated Liquid Background */
        .liquid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            filter: blur(60px);
            z-index: -1;
        }

        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb1 { background: #ff2d55; top: -10%; left: -10%; }
        .orb2 { background: #5856d6; bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb3 { background: #007aff; top: 40%; left: 30%; animation-delay: -10s; }

        @keyframes float {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(150px, 150px) scale(1.3); }
        }

        /* Liquid Glass Card */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        h1 { color: #fff; font-size: 26px; margin-bottom: 5px; font-weight: 700; }
        p { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 30px; }

        /* Liquid Input Fields */
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: #fff; background: rgba(255,255,255,0.12); }

        /* Liquid Animated Buttons */
        .btn-main {
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-main:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* SSO Buttons (Google, Apple, GitHub) */
        .sso-group {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-sso {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-sso:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }

        .btn-sso img { width: 20px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }

        .links {
            margin-top: 25px;
            font-size: 13px;
        }

        .links a { color: rgba(255,255,255,0.6); text-decoration: none; margin: 0 10px; }
        .links a:hover { color: #fff; }

    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="login-card">
        <h1>SANDARUWAN WEB</h1>
