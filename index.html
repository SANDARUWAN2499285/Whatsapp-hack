<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirosha Sandaruwan Login</title>
    <style>
        body {
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); /* Colourful gradient background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.15); /* Slightly transparent white */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 350px;
            text-align: center;
            backdrop-filter: blur(10px); /* Glassmorphism effect */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 2.2rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .input-group input {
            width: calc(100% - 20px);
            padding: 12px 10px;
            border: none;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 162, 255, 0.5);
        }
        .login-button {
            background-color: #00d2ff; /* Bright blue */
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }
        .login-button:hover {
            background-color: #00a2cc; /* Darker blue on hover */
            transform: translateY(-3px); /* Slight lift effect */
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.6);
        }
        .forgot-password {
            display: block;
            margin-top: 20px;
            color: #bbb;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        .forgot-password:hover {
            color: #00d2ff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Nirosha Sandaruwan Login</h1>
        <form action="#" method="post">
            <div class="input-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-button">Login</button>
        </form>
        <a href="#" class="forgot-password">Forgot Password?</a>
    </div>
</body>
</html>
