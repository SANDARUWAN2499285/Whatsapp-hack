<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SANDARUWAN WEB</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        h2 { color: #007aff; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>LOGIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Enter Site</button>
        <p id="msg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;
            
            // මෙතන ඔයාට කැමති Username එකක් සහ Password එකක් දාන්න
            if (user == "nirosha" && pass == "1234") {
                window.location.href = "main.html"; // හරි නම් main.html එකට යනවා
            } else {
                document.getElementById("msg").innerHTML = "වැරදියි! ආයෙත් උත්සාහ කරන්න.";
            }
        }
    </script>
</body>
</html>
