<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SANDARUWAN</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 280px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color:#007aff">LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">ENTER</button>
        <p id="msg" style="color:red; font-size:12px"></p>
    </div>
    <script>
        function login() {
            var u = document.getElementById("user").value;
            var p = document.getElementById("pass").value;
            if (u == "nirosha" && p == "1234") { window.location.href = "main.html"; }
            else { document.getElementById("msg").innerHTML = "වැරදියි!"; }
        }
    </script>
</body>
</html>
