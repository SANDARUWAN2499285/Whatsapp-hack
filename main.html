<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCIAL MEDIA | SANDARUWAN</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }

        /* Background Animation */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #001f3f, #000);
            z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 25px; font-weight: 300; letter-spacing: 2px; }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
        }

        /* Social Media පාටවල් */
        .fb { background: #1877F2; }
        .wa { background: #25D366; }
        .yt { background: #FF0000; }
        .tk { background: #010101; border: 1px solid #fff; }

        .social-btn:hover { transform: scale(1.05); opacity: 0.9; }

        .back-btn {
            margin-top: 20px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: #ccc;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="container">
        <h2>CONNECT WITH ME</h2>
        
        <a href="https://www.facebook.com/YOUR_ID" class="social-btn fb">FACEBOOK</a>
        <a href="https://wa.me/947XXXXXXXXX" class="social-btn wa">WHATSAPP</a>
        <a href="https://www.youtube.com/@YOUR_CHANNEL" class="social-btn yt">YOUTUBE</a>
        <a href="https://www.tiktok.com/@YOUR_ID" class="social-btn tk">TIKTOK</a>

        <button class="back-btn" onclick="location.href='home.html'">Back</button>
    </div>

</body>
</html>
