<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANDARUWAN WEB | NIROSHA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* මූලික සැකසුම් */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        /* උඩ තියෙන බැනර් එක සහ AI Button එක */
        .header-banner {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .banner-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 2px;
            color: #007aff;
            text-transform: uppercase;
        }

        .ai-btn {
            background: linear-gradient(45deg, #007aff, #00ffcc);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.4);
            transition: 0.3s;
        }

        /* මැද කොටස (Profile) */
        .content {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 30px 0;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #007aff;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(0, 122, 255, 0.3);
            object-fit: cover;
        }

        h2 { font-size: 24px; margin-bottom: 5px; }
        .sub-text { color: #888; font-size: 14px; margin-bottom: 30px; }

        /* Social Media Buttons */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .link-card {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .link-card i {
            font-size: 22px;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        /* පාටවල් */
        .facebook { background: #1877F2; }
        .whatsapp { background: #25D366; }
        .youtube { background: #FF0000; }
        .instagram { background: linear-gradient(45deg, #f09433, #bc1888); }
        .tiktok { background: #000; border: 1px solid #444; }
        .x-twitter { background: #000; border: 1px solid #444; }
        .snapchat { background: #FFFC00; color: #000; }
        .telegram { background: #0088cc; }
        .imo { background: #2F80ED; }
        .viber { background: #7360F2; }
        .phone { background: #333; }

        .link-card:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .footer-btn {
            margin-top: 40px;
            background: none;
            border: 1px solid #444;
            color: #777;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .footer-btn:hover { color: white; border-color: white; }
    </style>
</head>
<body>

    <div class="header-banner">

</body>
</html>
