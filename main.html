<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANDARUWAN WEB | NIROSHA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Banner with AI Button inside */
        .top-banner {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .banner-text { font-weight: 800; font-size: 18px; letter-spacing: 3px; color: #007aff; text-transform: uppercase; }

        .ai-banner-btn {
            background: linear-gradient(45deg, #007aff, #00ffcc);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.4);
            transition: 0.3s;
        }
        .ai-banner-btn:hover { transform: scale(1.05); }

        .container { width: 90%; max-width: 400px; text-align: center; padding: 30px 0; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #007aff; object-fit: cover; margin-bottom: 10px; box-shadow: 0 0 20px rgba(0,122,255,0.4); }
        h2 { margin: 5px 0; font-size: 22px; }
        p { color: #888; font-size: 13px; margin-bottom: 20px; }

        .links { width: 100%; }
        .social-link { display: flex; align-items: center; text-decoration: none; color: white; padding: 14px 20px; margin: 10px 0; border-radius: 18px; font-weight: 600; font-size: 15px; transition: 0.3s ease; }
        .social-link i { font-size: 20px; margin-right: 15px; width: 25px; text-align: center; }

        /* Social Colors */
        .facebook { background: #1877F2; } .whatsapp { background: #25D366; } .youtube { background: #FF0000; } 
        .instagram { background: linear-gradient(45deg, #f09433, #bc1888); } .tiktok { background: #000; border: 1px solid #333; }
        .snapchat { background: #FFFC00; color: #000; } .telegram { background: #0088cc; } .phone { background: #333; }
        .imo { background: #2F80ED; } .viber { background: #7360F2; } .x-twitter { background: #000; border: 1px solid #444; }

        .social-link:hover { transform: translateY(-3px); filter: brightness(1.2); }
        .back-btn { background: none; border: 1px solid #444; color: #777; padding: 10px 25px; margin-top: 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-banner">
        <div class="banner-text">SANDARUWAN WEB</div>
        <a href="ai.html" class="ai-banner-btn">
            <i class="fas fa-robot"></i> AI
        </a>
    </div>

    <div class="container">
        <img src="profile.png" class="profile-img" alt="Nirosha">
        <h2>NIROSHA SANDARUWAN</h2>
        <p>Connect with me on Social Media</p>
