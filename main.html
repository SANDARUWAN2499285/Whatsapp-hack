<!DOCTYPE html>
<html lang="en">
<head>

    <title>SANDARUWAN WEB | NIROSHA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Top Banner Style */
        .top-banner {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 5px;
            color: #007aff;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container { width: 90%; max-width: 400px; text-align: center; padding: 40px 0; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #007aff; object-fit: cover; margin-bottom: 15px; box-shadow: 0 0 25px rgba(0,122,255,0.5); }
        h2 { margin: 10px 0; font-size: 24px; letter-spacing: 1px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        .links { width: 100%; }
        .social-link { display: flex; align-items: center; text-decoration: none; color: white; padding: 15px 22px; margin: 12px 0; border-radius: 20px; font-weight: 600; font-size: 16px; transition: 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .social-link i { font-size: 22px; margin-right: 15px; width: 30px; text-align: center; }

        /* AI Button Special Style */
        .ai-btn { background: linear-gradient(45deg, #007aff, #00ffcc); border: none; box-shadow: 0 4px 15px rgba(0,122,255,0.4); }
        
        .facebook { background: #1877F2; } .whatsapp { background: #25D366; } .youtube { background: #FF0000; } 
        .instagram { background: linear-gradient(45deg, #f09433, #bc1888); } .tiktok { background: #000; border: 1px solid #444; }
        
        .social-link:hover { transform: translateY(-5px); filter: brightness(1.2); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .back-btn { background: none; border: 1px solid #333; color: #777; padding: 12px 30px; margin-top: 40px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .back-btn:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

        <div class="links">
            <a href="ai.html" class="social-link ai-btn">
                <i class="fas fa-robot"></i> SANDARUWAN AI
            </a>

            <a href="https://wa.me/94741570339" target="_blank" class="social-link whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="https://www.facebook.com/share/18Bp78yEBk/" target="_blank" class="social-link facebook">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://youtube.com/@nirosha_sandaruwan" target="_blank" class="social-link youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://www.instagram.com/sandaruwan249928" target="_blank" class="social-link instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@nirosha_sandaruwan" target="_blank" class="social-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <button class="back-btn" onclick="location.href='home.html'">Back to Home</button>
    </div>

</body>
